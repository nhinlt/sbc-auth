<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Connecting…</title>
<style>
  body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;
       height:100vh;margin:0;background:#f0fdfe;color:#0c3d44}
  .box{text-align:center;padding:32px;border-radius:12px;background:#fff;
       box-shadow:0 4px 24px rgba(13,140,158,.15);border:1px solid #c8edf2;min-width:280px}
  .icon{font-size:36px;margin-bottom:12px}
  .title{font-size:15px;font-weight:700;margin-bottom:6px}
  .sub{font-size:12px;color:#6b7280}
</style>
</head>
<body>
<div class="box">
  <div class="icon" id="icon">⏳</div>
  <div class="title" id="title">Đang kết nối Drive…</div>
  <div class="sub" id="sub">Cửa sổ này sẽ tự đóng</div>
</div>
<script>
  (function(){
    var hash = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var token = params.get('access_token');
    var error = params.get('error');

    if(token){
      // Gửi token về cửa sổ mở popup (dashboard)
      if(window.opener && !window.opener.closed){
        window.opener.postMessage({type:'GDRIVE_TOKEN', access_token: token}, '*');
      }
      document.getElementById('icon').textContent = '✅';
      document.getElementById('title').textContent = 'Drive đã kết nối!';
      document.getElementById('sub').textContent = 'Đóng cửa sổ này hoặc chờ tự đóng…';
      setTimeout(function(){ window.close(); }, 1500);
    } else if(error){
      document.getElementById('icon').textContent = '⚠️';
      document.getElementById('title').textContent = 'Lỗi: ' + error;
      document.getElementById('sub').textContent = 'Đóng cửa sổ và thử lại';
      if(window.opener && !window.opener.closed){
        window.opener.postMessage({type:'GDRIVE_ERROR', error: error}, '*');
      }
    } else {
      document.getElementById('icon').textContent = '❓';
      document.getElementById('title').textContent = 'Không có token';
      document.getElementById('sub').textContent = 'Thử lại từ đầu';
    }
  })();
</script>
</body>
</html>
